apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegisos-sa
  namespace: aegisos-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegisos-pod-reader
  namespace: aegisos-ops
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegisos-rb
  namespace: aegisos-ops
subjects:
  - kind: ServiceAccount
    name: aegisos-sa
    namespace: aegisos-ops
roleRef:
  kind: Role
  name: aegisos-pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: console-pdb
  namespace: aegisos-ops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: console
