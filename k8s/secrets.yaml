metadata:
  name: aegisos-secrets
  namespace: aegisos-ops
  labels:
    app.kubernetes.io/name: aegisos
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
  AUTH_SECRET: "CHANGE_ME"
