apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: openclaw-ops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-console-ingress
  namespace: openclaw-ops
spec:
  podSelector:
    matchLabels:
      app: console
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {} # Allow traffic from ingress controllers in other namespaces
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-redis-ingress
  namespace: openclaw-ops
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: console
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
