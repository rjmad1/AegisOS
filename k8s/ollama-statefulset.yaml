apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: openclaw-ops
spec:
  serviceName: ollama-service
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: openclaw-ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: api
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1" # Schedule 1 Nvidia GPU if available
            requests:
              cpu: "1"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - ollama
                - list
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: openclaw-ops
spec:
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama
  type: ClusterIP
