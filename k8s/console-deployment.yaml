apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: openclaw-ops
  labels:
    app: console
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: console
          image: openclaw-console:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: openclaw-secrets
          env:
            - name: DATABASE_PROVIDER
              value: "postgres"
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: console-service
  namespace: openclaw-ops
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: console
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: console-hpa
  namespace: openclaw-ops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: console
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
