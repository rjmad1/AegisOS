apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegisos-ops.fullname" . }}-secrets
  labels:
    {{- include "aegisos-ops.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.secrets.googleClientId }}
  {{- fail "secrets.googleClientId is required. Set via --set secrets.googleClientId=VALUE" }}
  {{- end }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  {{- if not .Values.secrets.googleClientSecret }}
  {{- fail "secrets.googleClientSecret is required. Set via --set secrets.googleClientSecret=VALUE" }}
  {{- end }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  {{- if not .Values.secrets.authSecret }}
  {{- fail "secrets.authSecret is required. Set via --set secrets.authSecret=VALUE" }}
  {{- end }}
  AUTH_SECRET: {{ .Values.secrets.authSecret | quote }}
  {{- if not .Values.secrets.adminUsername }}
  {{- fail "secrets.adminUsername is required. Set via --set secrets.adminUsername=VALUE" }}
  {{- end }}
  OPS_ADMIN_USERNAME: {{ .Values.secrets.adminUsername | quote }}
  {{- if not .Values.secrets.adminPassword }}
  {{- fail "secrets.adminPassword is required. Set via --set secrets.adminPassword=VALUE" }}
  {{- end }}
  OPS_ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  {{- if not .Values.secrets.jwtSecret }}
  {{- fail "secrets.jwtSecret is required. Set via --set secrets.jwtSecret=VALUE" }}
  {{- end }}
  OPS_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if not .Values.secrets.databaseUrl }}
  {{- fail "secrets.databaseUrl is required. Set via --set secrets.databaseUrl=VALUE" }}
  {{- end }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- if not .Values.secrets.redisUrl }}
  {{- fail "secrets.redisUrl is required. Set via --set secrets.redisUrl=VALUE" }}
  {{- end }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
