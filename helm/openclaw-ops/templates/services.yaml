apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-ops.fullname" . }}-console-service
  labels:
    {{- include "openclaw-ops.labels" . | nindent 4 }}
    app: console
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.consolePort }}
      targetPort: {{ .Values.service.consolePort }}
      protocol: TCP
      name: http
  selector:
    {{- include "openclaw-ops.selectorLabels" . | nindent 4 }}
    app: console
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-ops.fullname" . }}-litellm-service
  labels:
    {{- include "openclaw-ops.labels" . | nindent 4 }}
    app: litellm
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.litellmPort }}
      targetPort: {{ .Values.service.litellmPort }}
      protocol: TCP
      name: api
  selector:
    {{- include "openclaw-ops.selectorLabels" . | nindent 4 }}
    app: litellm
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-ops.fullname" . }}-ollama-service
  labels:
    {{- include "openclaw-ops.labels" . | nindent 4 }}
    app: ollama
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.ollamaPort }}
      targetPort: {{ .Values.service.ollamaPort }}
      protocol: TCP
      name: api
  selector:
    {{- include "openclaw-ops.selectorLabels" . | nindent 4 }}
    app: ollama
