apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw-ops.fullname" . }}-secrets
  labels:
    {{- include "openclaw-ops.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | default "google_oauth_client_id_dev_secure_890123" | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | default "google_oauth_client_secret_dev_secure_890123" | quote }}
  AUTH_SECRET: {{ .Values.secrets.authSecret | default "console_jwt_session_auth_secret_dev_secure_120938" | quote }}
  OPS_ADMIN_USERNAME: {{ .Values.secrets.adminUsername | quote }}
  OPS_ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  OPS_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: "postgresql://console_admin:{{ .Values.secrets.adminPassword }}@{{ include "openclaw-ops.fullname" . }}-postgres-service:5432/openclaw"
  REDIS_URL: "redis://{{ include "openclaw-ops.fullname" . }}-redis-service:6379"
