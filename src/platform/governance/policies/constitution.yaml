constitution:
  principles:
    - id: single-authoritative-runtime
      severity: critical
      description: Platform intelligence must not be duplicated outside the Runtime Manager and Platform Intelligence Kernel.

    - id: architecture-freeze
      severity: critical
      description: New foundational primitives require an approved ADR.

    - id: contracts-before-implementations
      severity: critical
      description: Public contracts are defined before code.

    - id: extension-first
      severity: warning
      description: New capabilities are delivered through providers, missions, packages, deployment profiles, or extensions whenever possible.

    - id: evidence-based-engineering
      severity: critical
      description: Every significant platform action produces verifiable evidence.

    - id: local-first-by-default
      severity: warning
      description: A single workstation remains a fully functional deployment target.

    - id: one-architecture-many-deployment-models
      severity: critical
      description: Deployment differences are expressed through profiles, not forks.

    - id: secure-by-default
      severity: critical
      description: All distributable artifacts are signed, qualified, and traceable.

    - id: backward-compatibility
      severity: critical
      description: Public APIs, SDKs, and package contracts follow semantic versioning and compatibility guarantees.

    - id: observability-cross-cutting
      severity: warning
      description: Operational insight is derived from the Platform Intelligence & Observability Fabric rather than isolated monitoring components.

    - id: kernel-single-responsibility
      severity: critical
      description: Kernel components must have exactly one responsibility.

    - id: no-cross-layer-dependencies
      severity: critical
      description: Higher level layers may depend on lower level layers, but never the reverse.

    - id: composition-over-inheritance
      severity: warning
      description: Prefer composing behaviors over deep inheritance chains.

    - id: deterministic-execution
      severity: critical
      description: Platform execution should be entirely deterministic based on its inputs and state.

    - id: capability-least-privilege
      severity: critical
      description: Capabilities should be granted the minimum necessary permissions.
