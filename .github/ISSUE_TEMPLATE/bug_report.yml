name: Bug Report
description: Report a bug or error in AegisOS Studio
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this issue?
      placeholder: |
        1. Open the dashboard.
        2. Click on SRE Copilot drawer.
        3. Trigger VRAM Purge.
    validations:
      required: true
  - type: input
    id: env_specs
    attributes:
      label: Host Environment
      description: OS version, GPU model, and Node.js version.
      placeholder: Windows 11, NVIDIA RTX 4080, Node v20.12.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Logs
      description: Paste relevant logs from your terminal or console developer tools.
