name: AegisOS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

jobs:
  build-and-validate:
    name: Build, Lint, Test, and Validate
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Node.js LTS version
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Run Linter
      - name: Code Quality Linting
        run: npm run lint

      # 5. Run TypeScript type compilation checks
      - name: Static Type Compilation Verification
        run: npx tsc --noEmit

      # 6. Run unit tests
      - name: Unit Test Suite
        run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test
          DATABASE_URL: 'file:./databases/test.db'
          AUTH_SECRET: 'ci-test-only-auth-secret-not-for-production-aaaa-bbbb-cccc-dddd-1234567890'
          OPS_JWT_SECRET: 'ci-test-only-jwt-secret-not-for-production-eeee-ffff-0000-1111-0987654321'
          OPS_ADMIN_USERNAME: 'ci-test-admin'
          OPS_ADMIN_PASSWORD: 'CiTestOnlyPassword!NotForProduction'
          GOOGLE_CLIENT_ID: 'ci-test-google-client-id.example.com'
          GOOGLE_CLIENT_SECRET: 'ci-test-google-client-secret'

      # 7. Dependency vulnerability scan
      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # 8. Run Next.js production build
      - name: Production Build Execution
        run: npm run build
        env:
          NODE_ENV: production
          # Build-time placeholders — these satisfy Next.js env checks during compilation.
          # They are clearly non-functional and overridden at runtime.
          OPS_JWT_SECRET: build-time-placeholder-not-a-real-secret-minimum-length-required-for-compilation
          AUTH_SECRET: build-time-placeholder-not-a-real-secret-minimum-length-required-for-compilation
          OPS_ADMIN_USERNAME: build-placeholder
          OPS_ADMIN_PASSWORD: build-placeholder
          GOOGLE_CLIENT_ID: build-placeholder.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: build-placeholder
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          LITELLM_BASE_URL: http://127.0.0.1:4000

      # 9. Package build artifacts (ZIP)
      - name: Archive and Package Production Bundle
        run: |
          zip -r production_release.zip \
            .next \
            public \
            package.json \
            package-lock.json \
            Caddyfile \
            automation \
            deploy.bat \
            manage.bat \
            backup.bat \
            restore.bat \
            health.bat \
            -x "*.git*" "node_modules/*" "databases/*" "backups/*" "logs/*"

      # 10. Upload Build Artifact
      - name: Upload Build Artifact Bundle
        uses: actions/upload-artifact@v4
        with:
          name: production-console-release
          path: production_release.zip
          retention-days: 14
