networks:
  aegisos-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  open_webui_data:

services:
  # 1. Database Persistence
  postgres:
    image: postgres:16.4-alpine
    container_name: aegisos-postgres
    restart: always
    environment:
      POSTGRES_DB: aegisos
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${HOST_PORT_POSTGRES:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aegisos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d aegisos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis Caching & Queue
  redis:
    image: redis:7.4-alpine
    container_name: aegisos-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "${HOST_PORT_REDIS:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aegisos-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Object Storage
  minio:
    image: minio/minio:RELEASE.2024-07-04T14-25-45Z
    container_name: aegisos-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${HOST_PORT_MINIO:-9000}:9000"
      - "${HOST_PORT_MINIO_CONSOLE:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - aegisos-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 4. Local AI Model Server
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: aegisos-ollama
    restart: always
    ports:
      - "${HOST_PORT_OLLAMA:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aegisos-net

  # 5. AI Router Proxy
  litellm:
    build:
      context: .
      dockerfile: Dockerfile.litellm
    container_name: aegisos-litellm
    restart: always
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
    ports:
      - "${HOST_PORT_LITELLM:-4000}:4000"
    volumes:
      - ./configs/litellm:/app/configs
    networks:
      - aegisos-net
    depends_on:
      - ollama

  # 6. OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: aegisos-otel-collector
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./configs/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "${HOST_PORT_OTEL_GRPC:-4317}:4317" # gRPC
      - "${HOST_PORT_OTEL_HTTP:-4318}:4318" # HTTP
    networks:
      - aegisos-net

  # 7. Prometheus Metrics
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: aegisos-prometheus
    restart: always
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "${HOST_PORT_PROMETHEUS:-9090}:9090"
    networks:
      - aegisos-net

  # 8. Loki Logs
  loki:
    image: grafana/loki:3.1.0
    container_name: aegisos-loki
    restart: always
    ports:
      - "${HOST_PORT_LOKI:-3100}:3100"
    networks:
      - aegisos-net

  # 9. Jaeger Traces
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: aegisos-jaeger
    restart: always
    ports:
      - "${HOST_PORT_JAEGER:-16686}:16686" # UI
      - "${HOST_PORT_JAEGER_OTLP:-4319}:4317"        # OTLP gRPC input
    networks:
      - aegisos-net

  # 10. Grafana Dashboard
  grafana:
    image: grafana/grafana:11.1.0
    container_name: aegisos-grafana
    restart: always
    ports:
      - "${HOST_PORT_GRAFANA:-3002}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - aegisos-net
    depends_on:
      - prometheus
      - loki
      - jaeger

  # 11. Operations Console
  console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegisos-console
    restart: always
    environment:
      - DATABASE_PROVIDER=postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aegisos
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OBJECT_STORAGE_PROVIDER=minio
      - AWS_S3_BUCKET=aegisos-artifacts
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=http://minio:9000
      - SECRETS_PROVIDER=${SECRETS_PROVIDER:-local}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_BASE_URL=http://litellm:4000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID in .env}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET in .env}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env}
      - OPS_ADMIN_USERNAME=${OPS_ADMIN_USERNAME:?Set OPS_ADMIN_USERNAME in .env}
      - OPS_ADMIN_PASSWORD=${OPS_ADMIN_PASSWORD:?Set OPS_ADMIN_PASSWORD in .env}
      - OPS_JWT_SECRET=${OPS_JWT_SECRET:?Set OPS_JWT_SECRET in .env}
    ports:
      - "${HOST_PORT_CONSOLE:-3000}:3000"
    networks:
      - aegisos-net
    depends_on:
      - postgres
      - redis
      - minio

  # 12. Reverse Proxy & Gateway
  nginx:
    image: nginx:1.27-alpine
    container_name: aegisos-nginx
    restart: always
    ports:
      - "${HOST_PORT_NGINX_HTTP:-80}:80"
      - "${HOST_PORT_NGINX_HTTPS:-443}:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - aegisos-net
    depends_on:
      - console

  # 13. Client-facing Web UI (Open WebUI portal)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: aegisos-open-webui
    restart: always
    environment:
      - PORT=8090
      - DATA_DIR=/app/backend/data
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY in .env}
      - WEBUI_AUTH=True
      - WEBUI_NAME=AegisOS
      - SCARF_NO_ANALYTICS=True
      - DO_NOT_TRACK=True
      - ANONYMIZED_TELEMETRY=False
      - ENABLE_OLLAMA_API=False
      - ENABLE_OPENAI_API=True
      - OPENAI_API_BASE_URLS=http://host.docker.internal:18789/v1
      - OPENAI_API_KEYS=${OPS_JWT_SECRET:?Set OPS_JWT_SECRET in .env}
      - ENABLE_RAG=False
      - ENABLE_RAG_WEB_SEARCH=False
      - ENABLE_CODE_INTERPRETER=False
      - ENABLE_CODE_EXECUTION=False
      - WEBUI_ADMIN_EMAIL=${OPS_ADMIN_USERNAME:?Set OPS_ADMIN_USERNAME in .env}
      - WEBUI_ADMIN_PASSWORD=${OPS_ADMIN_PASSWORD:?Set OPS_ADMIN_PASSWORD in .env}
      - WEBUI_ADMIN_NAME=Administrator
      - WEBUI_BANNERS=[{"content":"Managed Workstation Environment — Orchestration by AegisOS","type":"info"}]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_PORT_OPEN_WEBUI:-8090}:8090"
    volumes:
      - open_webui_data:/app/backend/data
      - ./artifacts_storage:/app/backend/data/uploads:rw
    networks:
      - aegisos-net
    depends_on:
      - litellm
