version: '3.8'

networks:
  openclaw-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:

services:
  # 1. Database Persistence
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    restart: always
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: console_admin
      POSTGRES_PASSWORD: DevConsolePassword9023!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U console_admin -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis Caching & Queue
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Object Storage
  minio:
    image: minio/minio:latest
    container_name: openclaw-minio
    restart: always
    environment:
      MINIO_ROOT_USER: console_admin
      MINIO_ROOT_PASSWORD: DevConsolePassword9023!
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 4. Local AI Model Server
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: openclaw-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - openclaw-net

  # 5. AI Router Proxy
  litellm:
    build:
      context: .
      dockerfile: Dockerfile.litellm
    container_name: openclaw-litellm
    restart: always
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
    ports:
      - "4000:4000"
    volumes:
      - ./configs/litellm:/app/configs
    networks:
      - openclaw-net
    depends_on:
      - ollama

  # 6. OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: openclaw-otel-collector
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./configs/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # gRPC
      - "4318:4318" # HTTP
    networks:
      - openclaw-net

  # 7. Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: openclaw-prometheus
    restart: always
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - openclaw-net

  # 8. Loki Logs
  loki:
    image: grafana/loki:latest
    container_name: openclaw-loki
    restart: always
    ports:
      - "3100:3100"
    networks:
      - openclaw-net

  # 9. Jaeger Traces
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: openclaw-jaeger
    restart: always
    ports:
      - "16686:16686" # UI
      - "4317"        # OTLP gRPC input
    networks:
      - openclaw-net

  # 10. Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: openclaw-grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - openclaw-net
    depends_on:
      - prometheus
      - loki
      - jaeger

  # 11. Operations Console
  console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-console
    restart: always
    environment:
      - DATABASE_PROVIDER=postgres
      - DATABASE_URL=postgresql://console_admin:DevConsolePassword9023!@postgres:5432/openclaw
      - REDIS_URL=redis://redis:6379
      - OBJECT_STORAGE_PROVIDER=minio
      - AWS_S3_BUCKET=openclaw-artifacts
      - AWS_ACCESS_KEY_ID=console_admin
      - AWS_SECRET_ACCESS_KEY=DevConsolePassword9023!
      - MINIO_ENDPOINT=http://minio:9000
      - SECRETS_PROVIDER=vault
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_BASE_URL=http://litellm:4000
      - GOOGLE_CLIENT_ID=google_oauth_client_id_dev_secure_890123
      - GOOGLE_CLIENT_SECRET=google_oauth_client_secret_dev_secure_890123
      - AUTH_SECRET=console_jwt_session_auth_secret_dev_secure_120938
      - OPS_ADMIN_USERNAME=console_admin_dev
      - OPS_ADMIN_PASSWORD=DevConsolePassword9023!
      - OPS_JWT_SECRET=secrets_encryption_key_dev_secure_901283
    ports:
      - "3000:3000"
    networks:
      - openclaw-net
    depends_on:
      - postgres
      - redis
      - minio

  # 12. Reverse Proxy & Gateway
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - openclaw-net
    depends_on:
      - console
